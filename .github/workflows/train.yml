name: Run Diabetes Notebook

on: [push]

jobs:
  run-notebook:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install libraries
        run: |
          pip install -r requirements.txt

      - name: Execute notebook
        run: |
          jupyter nbconvert --to notebook --execute diabetes_dnn.ipynb --output executed.ipynb